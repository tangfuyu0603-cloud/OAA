<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高度育成高等學校 · 中央數據庫驗證系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #050810;
    color: #e8f0fe;
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* 網格背景 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,210,255,0.028) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,210,255,0.028) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* 頂部環境光 */
  body::after {
    content: '';
    position: fixed;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(0,210,255,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  /* 主卡片 */
  .card {
    position: relative;
    z-index: 10;
    width: min(92vw, 420px);
    background: #080d1a;
    border: 1px solid rgba(0,210,255,0.28);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,210,255,0.08), 0 0 120px rgba(0,210,255,0.04);
    animation: card-in 0.42s cubic-bezier(0.4,0,0.2,1);
  }

  @keyframes card-in {
    from { opacity: 0; transform: scale(0.97) translateY(12px); }
    65%  { opacity: 1; transform: scale(1.003) translateY(-2px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* 頂部青藍漸層線 */
  .card::before {
    content: '';
    display: block;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00d2ff 40%, #00a8e8 60%, transparent);
  }

  /* 掃描線動畫 */
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,210,255,0.6), transparent);
    animation: scan 4s linear infinite;
    pointer-events: none;
  }
  @keyframes scan {
    from { top: 0; opacity: 0.8; }
    80%  { opacity: 0.4; }
    to   { top: 100%; opacity: 0; }
  }

  .card-body { padding: 36px 32px 32px; text-align: center; }

  /* 標誌 */
  .emblem {
    width: 56px; height: 56px;
    border: 1.5px solid rgba(0,210,255,0.35);
    border-radius: 12px;
    background: rgba(0,210,255,0.06);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 18px; font-weight: 800;
    color: #00d2ff;
    letter-spacing: -1px;
    margin: 0 auto 20px;
  }

  .title-main {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px; font-weight: 600;
    color: #00d2ff;
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }
  .title-sub {
    font-size: 10px;
    color: rgba(192,207,224,0.40);
    letter-spacing: 0.08em;
    margin-bottom: 32px;
    line-height: 1.6;
  }

  /* 分隔線 */
  .divider {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 24px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px;
    background: rgba(0,210,255,0.12);
  }
  .divider span {
    font-size: 9px;
    color: rgba(0,210,255,0.38);
    letter-spacing: 0.14em;
    white-space: nowrap;
  }

  /* OAuth 登入按鈕 */
  #oauth-btn {
    width: 100%;
    padding: 14px 20px;
    background: rgba(0,210,255,0.07);
    border: 1px solid rgba(0,210,255,0.40);
    border-radius: 10px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px; font-weight: 600;
    color: #00d2ff;
    letter-spacing: 0.14em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.1s;
    position: relative; overflow: hidden;
    margin-bottom: 16px;
  }
  #oauth-btn:hover {
    background: rgba(0,210,255,0.14);
    border-color: rgba(0,210,255,0.65);
    box-shadow: 0 0 32px rgba(0,210,255,0.20);
  }
  #oauth-btn:active { transform: scale(0.98); }
  #oauth-btn:disabled { opacity: 0.50; cursor: not-allowed; }

  #oauth-btn .spinner {
    display: none;
    position: absolute; inset: 0;
    align-items: center; justify-content: center;
    background: inherit;
  }
  #oauth-btn.loading .btn-text { visibility: hidden; }
  #oauth-btn.loading .spinner  { display: flex; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin-icon { animation: spin 0.8s linear infinite; }

  /* 說明文字 */
  .hint {
    font-size: 10px;
    color: rgba(192,207,224,0.30);
    letter-spacing: 0.05em;
    line-height: 1.7;
    margin-bottom: 4px;
  }

  /* 錯誤訊息 */
  #err-msg {
    display: none;
    margin-top: 12px;
    font-size: 10px;
    color: #ff6b6b;
    letter-spacing: 0.05em;
  }

  /* 頁腳 */
  .footer {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid rgba(0,210,255,0.08);
    font-size: 9px;
    color: rgba(192,207,224,0.22);
    letter-spacing: 0.06em;
    line-height: 1.7;
  }

  /* 底部藍線 */
  .card-bottom {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,210,255,0.16), transparent);
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-body">

    <div class="emblem">OAA</div>
    <div class="title-main">高度育成高等學校 · 東京都立</div>
    <div class="title-sub">
      全面能力指標系統 · OMNIDIRECTIONAL ABILITY ASSESSMENT<br>
      中央數據庫驗證系統
    </div>

    <div class="divider"><span>身份驗證 · IDENTITY VERIFICATION</span></div>

    <!-- OAuth 登入按鈕 -->
    <button id="oauth-btn" onclick="startOAuth()">
      <span class="btn-text">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        使用 1campus 帳號登入
      </span>
      <span class="spinner">
        <svg class="spin-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5">
          <path d="M21 12a9 9 0 1 1-6.22-8.56"/>
        </svg>
      </span>
    </button>

    <div class="hint">
      點擊後將跳轉至 1campus 官方驗證頁面<br>
      完成驗證後自動返回本系統
    </div>

    <div id="err-msg"></div>

    <div class="footer">
      ⚠ 本系統為高度育成學校內部管理平台<br>
      未經授權存取將依法追究責任
    </div>

    <!-- 開發用入口（正式上線前移除） -->
    <div style="margin-top:16px;">
      <a href="/api/dev-login"
         style="font-size:9px;color:rgba(0,210,255,0.25);letter-spacing:0.08em;text-decoration:none;">
        ［開發模式進入］
      </a>
    </div>

  </div>
  <div class="card-bottom"></div>
</div>

<script>
// 已登入則直接跳轉
if (localStorage.getItem('token')) location.href = '/dashboard';

// 檢查 OAuth 錯誤（從 URL error 參數）
const _errParam = new URLSearchParams(window.location.search).get('error');
if (_errParam) {
  const errEl = document.getElementById('err-msg');
  errEl.textContent = `驗證失敗：${decodeURIComponent(_errParam)}`;
  errEl.style.display = 'block';
}

function startOAuth() {
  const btn = document.getElementById('oauth-btn');
  btn.disabled = true;
  btn.classList.add('loading');
  location.href = '/api/oauth/redirect';
}
</script>
</body>
</html>
